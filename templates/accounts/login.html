{% extends "base.html" %}

{% block title %}Login - Brisbane Star Care{% endblock %}

{% block body %}
<div class="login-page">
  <form class="login-card" method="post">
    {% csrf_token %}
    <h1>Brisbane Star Care</h1>
    <p>NDIS Admin System</p>
    {% if form.errors %}
      <div class="error">Invalid username or password.</div>
    {% endif %}
    <label>
      Username
      {{ form.username }}
    </label>
    <label>
      Password
      {{ form.password }}
    </label>
    <button type="submit">Login</button>
  </form>
</div>
{% endblock %}
