{% extends "base.html" %}

{% block body %}
<div class="app-shell">
  <aside class="sidebar">
    <div class="brand">Brisbane Star Care</div>
    <nav>
      <a href="{% url 'admin_dashboard' %}">Dashboard</a>
      <a href="#">Participants</a>
      <a href="#">Support Workers</a>
      <a href="#">Roster</a>
      <a href="#">Service Logs</a>
      <a href="{% url 'invoice_placeholder' %}">Invoices</a>
    </nav>
  </aside>
  <section class="content">
    <header class="topbar">
      <span>{{ request.user.get_username }}</span>
      <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <button type="submit">Logout</button>
      </form>
    </header>
    {% block content %}{% endblock %}
  </section>
</div>
{% endblock %}
