{% extends "base.html" %}

{% block body %}
<div class="app-shell">
  <aside class="sidebar">
    <div class="brand">Brisbane Star Care</div>
    <nav>
      <a href="{% url 'admin_dashboard' %}">Dashboard</a>
      <a href="{% url 'participant_list' %}">Participants</a>
      <a href="{% url 'worker_list' %}">Support Workers</a>
      <a href="{% url 'roster_list' %}">Roster</a>
      <a href="{% url 'service_log_list' %}">Service Logs</a>
      <a href="{% url 'invoice_placeholder' %}">Invoices</a>
      <a href="{% url 'document_list' %}">Documents</a>
      <a href="{% url 'support_item_list' %}">Support Items</a>
      <a href="{% url 'audit_log_list' %}">Audit Logs</a>
    </nav>
  </aside>
  <section class="content">
    <header class="topbar">
      <span>{{ request.user.get_username }}</span>
      <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <button type="submit">Logout</button>
      </form>
    </header>
    {% block content %}{% endblock %}
  </section>
</div>
{% endblock %}
