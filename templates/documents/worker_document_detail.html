{% extends "worker_base.html" %}

{% block title %}Document - Brisbane Star Care{% endblock %}

{% block content %}
<section class="worker-card">
  <div class="page-header">
    <div>
      <h1>{{ document.title }}</h1>
    </div>
    <a class="button secondary" href="{% url 'worker_document_list' %}">Back to Documents</a>
  </div>
  <dl class="detail-list">
    <dt>Category</dt><dd>{{ document.get_category_display }}</dd>
    <dt>File</dt><dd>{{ document.filename }}</dd>
    <dt>Notes</dt><dd>{{ document.notes|default:"-" }}</dd>
  </dl>
  <a class="button" href="{% url 'worker_document_download' document.id %}">Download</a>
</section>
{% endblock %}
